services:
  web:
    build: .
    container_name: todo-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - db

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: